kind = "web"
previewPath = "/"
title = "Warframe Platinum Converter"
version = "1.0.0"
id = "artifacts/plat-converter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20306

[services.development]
run = "pnpm --filter @workspace/plat-converter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/plat-converter", "run", "build" ]
publicDir = "artifacts/plat-converter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20306"
BASE_PATH = "/"
